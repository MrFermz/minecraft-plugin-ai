# Central version catalog for the whole ecosystem.
# Bump versions here once; every module picks them up.

[versions]
# Paper API for Minecraft 26.2. Build 34 matches the server jar (paper-26.2-34.jar).
paper = "26.2.build.34-alpha"
# Java toolchain. Paper API 26.2 requires Java 25+ (the build fails on 21);
# bytecode 25 runs fine on the Java 26 the server is actually launched with.
java = "25"
shadow = "8.3.5"
# Central DB stack (loaded at runtime by core via Paper's library loader).
# SQLite = default/embedded; PostgreSQL = recommended for production; the
# MariaDB driver also serves MySQL.
hikari = "5.1.0"
sqlite = "3.46.1.3"
postgresql = "42.7.4"
mariadb = "3.4.1"

[libraries]
paper-api = { module = "io.papermc.paper:paper-api", version.ref = "paper" }
hikari = { module = "com.zaxxer:HikariCP", version.ref = "hikari" }
sqlite-jdbc = { module = "org.xerial:sqlite-jdbc", version.ref = "sqlite" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
mariadb-jdbc = { module = "org.mariadb.jdbc:mariadb-java-client", version.ref = "mariadb" }

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
